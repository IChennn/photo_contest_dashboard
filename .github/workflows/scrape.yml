name: 毎日フォトコンテスト情報を更新

on:
  schedule:
    # 毎日 09:00 JST (= 00:00 UTC)
    - cron: "0 0 * * *"
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存関係をインストール
        run: pip install -r scraper/requirements.txt

      - name: スクレイパーを実行
        run: python scraper/scrape.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/contests.json
          git diff --staged --quiet || git commit -m "chore: フォトコンテスト情報を更新 $(date +'%Y-%m-%d')"
          git push