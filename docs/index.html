<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フォトコンテスト 収集板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #f5f3ef;
    --bg2:      #edeae4;
    --bg3:      #e4e0d8;
    --surface:  #faf9f6;
    --border:   #d8d3c8;
    --border2:  #c8c2b4;
    --text:     #2c2820;
    --text2:    #6b6358;
    --text3:    #a09890;
    --accent:   #7a8c6e;   /* muted sage green */
    --red:      #a05c5c;   /* muted terracotta */
    --orange:   #a07850;   /* muted amber */
    --serif:    'Noto Serif JP', serif;
    --sans:     'Noto Sans JP', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    line-height: 1.7;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 32px clamp(20px, 5vw, 56px) 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 16px;
  }

  h1 {
    font-family: var(--serif);
    font-size: clamp(20px, 3.5vw, 32px);
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text);
    line-height: 1.2;
  }

  h1 em {
    font-style: normal;
    color: var(--accent);
  }

  .header-sub {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.12em;
    margin-top: 6px;
  }

  .updated-at {
    font-size: 11px;
    color: var(--text3);
    text-align: right;
    line-height: 1.6;
  }

  .updated-at strong {
    display: block;
    font-size: 12px;
    color: var(--text2);
    font-weight: 500;
  }

  /* ── STATS ── */
  .stats {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
  }

  .stat {
    flex: 1;
    padding: 16px clamp(12px, 2vw, 32px);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat:last-child { border-right: none; }

  .stat-num {
    font-family: var(--serif);
    font-size: clamp(22px, 2.5vw, 30px);
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-num.red    { color: var(--red); }
  .stat-num.orange { color: var(--orange); }
  .stat-num.green  { color: var(--accent); }

  .stat-label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.04em;
  }

  /* ── CONTROLS ── */
  .controls {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px clamp(20px, 5vw, 56px);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 180px;
    max-width: 300px;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 7px 12px 7px 28px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text3); }

  .search-icon {
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    color: var(--text3);
    pointer-events: none;
    font-style: normal;
  }

  .filters {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 6px 13px;
    color: var(--text2);
    font-family: var(--sans);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }

  .count-label {
    margin-left: auto;
    font-size: 12px;
    color: var(--text3);
    white-space: nowrap;
  }

  /* ── SOURCES BAR ── */
  .sources-bar {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 8px clamp(20px, 5vw, 56px);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .sources-label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.06em;
  }

  .source-link {
    font-size: 11px;
    color: var(--text2);
    text-decoration: none;
    border-bottom: 1px solid var(--border2);
    padding-bottom: 1px;
    transition: color 0.15s, border-color 0.15s;
  }

  .source-link:hover { color: var(--accent); border-color: var(--accent); }

  /* ── MAIN ── */
  main {
    padding: clamp(20px, 3vw, 40px) clamp(20px, 5vw, 56px);
  }

  #empty-state {
    text-align: center;
    padding: 72px 0;
    color: var(--text3);
  }

  #empty-state p { font-size: 14px; line-height: 2; }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 11px;
    position: relative;
    transition: box-shadow 0.15s, border-color 0.15s;
  }

  .card:hover {
    border-color: var(--border2);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  /* Left accent stripe by urgency */
  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 8px; bottom: 8px;
    width: 3px;
    border-radius: 0 2px 2px 0;
    background: var(--border);
  }

  .card-urgent::before { background: var(--red); }
  .card-soon::before   { background: var(--orange); }
  .card-normal::before { background: var(--accent); }

  /* ── CARD TOP ── */
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }

  .card-name {
    font-family: var(--serif);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.5;
    flex: 1;
  }

  .badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 2px;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.04em;
    font-weight: 500;
  }

  .badge-urgent { background: #f0e4e4; color: var(--red); }
  .badge-soon   { background: #f0ebe0; color: var(--orange); }
  .badge-normal { background: #e8ede4; color: var(--accent); }
  .badge-none   { background: var(--bg3); color: var(--text3); }

  /* ── CARD META ── */
  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 2px;
    background: var(--bg2);
    color: var(--text2);
    border: 1px solid var(--border);
  }

  .tag-source {
    color: var(--accent);
    background: #edf0ea;
    border-color: #d4dccf;
    text-decoration: none;
    cursor: pointer;
  }

  .tag-source:hover {
    background: #e0e8db;
  }

  /* ── DEADLINE ── */
  .deadline-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .deadline-label {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.06em;
    margin-bottom: 2px;
  }

  .deadline-date {
    font-family: var(--serif);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .deadline-date.urgent { color: var(--red); }
  .deadline-date.soon   { color: var(--orange); }

  .days-left {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 2px;
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border);
  }

  .days-left.urgent { color: var(--red);    background: #f5ecec; border-color: #e0cece; }
  .days-left.soon   { color: var(--orange); background: #f5f0e8; border-color: #e0d4c0; }

  /* ── PRIZE / NOTES ── */
  .prize {
    font-size: 12px;
    color: var(--orange);
  }

  .notes {
    font-size: 12px;
    color: var(--text3);
    line-height: 1.6;
    border-left: 2px solid var(--border2);
    padding-left: 10px;
  }

  /* ── ACTIONS ── */
  .card-actions {
    display: flex;
    gap: 6px;
    margin-top: auto;
  }

  .btn-entry {
    flex: 1;
    text-align: center;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    font-size: 12px;
    font-weight: 500;
    padding: 8px;
    border-radius: 3px;
    letter-spacing: 0.04em;
    transition: opacity 0.15s;
    font-family: var(--sans);
  }

  .btn-entry:hover { opacity: 0.85; }

  .btn-source {
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text2);
    text-decoration: none;
    font-size: 11px;
    padding: 8px 13px;
    border-radius: 3px;
    font-family: var(--sans);
    transition: all 0.15s;
  }

  .btn-source:hover { border-color: var(--accent); color: var(--accent); }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 18px clamp(20px, 5vw, 56px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    background: var(--surface);
  }

  .footer-links {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .footer-links a {
    font-size: 11px;
    color: var(--text3);
    text-decoration: none;
    transition: color 0.15s;
  }

  .footer-links a:hover { color: var(--accent); }

  .footer-note {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.04em;
  }

  @media (max-width: 600px) {
    header { grid-template-columns: 1fr; }
    .updated-at { text-align: left; }
    .stat { min-width: 50%; }
    .stats { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>フォトコンテスト<em>収集板</em></h1>
    <div class="header-sub">Photo Contest Dashboard · Japan · 毎日自動更新</div>
  </div>
  <div class="updated-at">
    最終更新
    <strong id="updated-at">---</strong>
  </div>
</header>

<div class="stats">
  <div class="stat">
    <span class="stat-num" id="stat-total">—</span>
    <span class="stat-label">件 募集中</span>
  </div>
  <div class="stat">
    <span class="stat-num red" id="stat-urgent">—</span>
    <span class="stat-label">件 締切7日以内</span>
  </div>
  <div class="stat">
    <span class="stat-num orange" id="stat-soon">—</span>
    <span class="stat-label">件 今月締切</span>
  </div>
  <div class="stat">
    <span class="stat-num green" id="stat-national">—</span>
    <span class="stat-label">件 全国対象</span>
  </div>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">&#x2315;</span>
    <input type="text" id="search" placeholder="コンテスト名・テーマで絞込み">
  </div>
  <div class="filters">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="urgent">締切間近</button>
    <button class="filter-btn" data-filter="national">全国</button>
    <button class="filter-btn" data-filter="local">地域</button>
    <button class="filter-btn" data-filter="prize">賞金あり</button>
  </div>
  <div class="count-label" id="count-label">— 件</div>
</div>

<div class="sources-bar">
  <span class="sources-label">情報元 :</span>
  <span id="sources-bar"></span>
</div>

<main>
  <div id="empty-state" style="display:none;">
    <p>コンテスト情報がまだありません。<br>
    GitHub Actions が毎日 09:00 JST に自動更新します。<br>
    初回は Actions タブから手動で実行してください。</p>
  </div>
  <div class="grid" id="grid"></div>
</main>

<footer>
  <div class="footer-links">
    <a href="https://picru.jp/opens/" target="_blank" rel="noreferrer">Picru</a>
    <a href="https://photosekai.com/post/photocontestnew/" target="_blank" rel="noreferrer">フォトセカイ</a>
    <a href="https://www.yamakei-online.com/yk/pt_contest/" target="_blank" rel="noreferrer">山と渓谷</a>
    <a href="https://compe.japandesign.ne.jp/category/photo/" target="_blank" rel="noreferrer">登竜門</a>
  </div>
  <div class="footer-note">毎日 09:00 JST 自動更新 · GitHub Actions</div>
</footer>

<script>
const DATA_URL = "data/contests.json";
const SOURCES = {
  "Picru":      "https://picru.jp/opens/",
  "フォトセカイ": "https://photosekai.com/post/photocontestnew/",
  "山と渓谷":   "https://www.yamakei-online.com/yk/pt_contest/",
  "登竜門":     "https://compe.japandesign.ne.jp/category/photo/",
};

let allContests = [];
let activeFilter = "all";
let searchText = "";

function urgency(deadline) {
  if (!deadline) return "none";
  const diff = (new Date(deadline) - new Date()) / 864e5;
  if (diff < 0)  return "expired";
  if (diff <= 7) return "urgent";
  if (diff <= 31) return "soon";
  return "normal";
}

function daysLeft(deadline) {
  if (!deadline) return null;
  return Math.ceil((new Date(deadline) - new Date()) / 864e5);
}

function formatDate(iso) {
  if (!iso) return null;
  const [y, m, d] = iso.split("-");
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}

function escHtml(str) {
  if (!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function render(contests) {
  const grid  = document.getElementById("grid");
  const empty = document.getElementById("empty-state");
  document.getElementById("count-label").textContent = `${contests.length} 件`;

  if (contests.length === 0) {
    grid.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  grid.innerHTML = contests.map(c => {
    const urg = urgency(c.deadline);
    if (urg === "expired") return "";

    const dl       = daysLeft(c.deadline);
    const cardCls  = urg === "urgent" ? "card-urgent" : urg === "soon" ? "card-soon" : urg === "normal" ? "card-normal" : "";
    const badgeCls = urg === "urgent" ? "badge-urgent" : urg === "soon" ? "badge-soon" : urg === "normal" ? "badge-normal" : "badge-none";
    const badgeTxt = urg === "urgent" ? "締切間近" : urg === "soon" ? "今月締切" : urg === "normal" ? "募集中" : "要確認";
    const dlCls    = urg === "urgent" ? "urgent" : urg === "soon" ? "soon" : "";

    const dlLabel = dl !== null
      ? `<div class="days-left ${dlCls}">${dl > 0 ? "あと " + dl + " 日" : "本日締切"}</div>`
      : "";

    const metaTags = [
      ...(c.sources || []).map(s =>
        `<a class="tag tag-source" href="${escHtml(s.url)}" target="_blank" rel="noreferrer">${escHtml(s.name)}</a>`
      ),
      c.region  ? `<span class="tag">${escHtml(c.region)}</span>` : "",
      c.theme   ? `<span class="tag">${escHtml(c.theme)}</span>`  : "",
    ].filter(Boolean).join("");

    const sourceBtn = (c.sources && c.sources.length > 0 && c.sources[0].url !== c.entryUrl)
      ? `<a class="btn-source" href="${escHtml(c.sources[0].url)}" target="_blank" rel="noreferrer">元記事</a>`
      : "";

    return `
      <div class="card ${cardCls}">
        <div class="card-top">
          <div class="card-name">${escHtml(c.name)}</div>
          <span class="badge ${badgeCls}">${badgeTxt}</span>
        </div>
        ${metaTags ? `<div class="card-meta">${metaTags}</div>` : ""}
        ${c.prize ? `<div class="prize">賞金 ${escHtml(c.prize)}</div>` : ""}
        <div class="deadline-box">
          <div>
            <div class="deadline-label">応募締切</div>
            <div class="deadline-date ${dlCls}">${formatDate(c.deadline) || escHtml(c.deadlineText)}</div>
          </div>
          ${dlLabel}
        </div>
        ${c.notes ? `<div class="notes">${escHtml(c.notes)}</div>` : ""}
        <div class="card-actions">
          <a class="btn-entry" href="${escHtml(c.entryUrl || c.sourceUrl)}" target="_blank" rel="noreferrer">応募ページへ</a>
          ${sourceBtn}
        </div>
      </div>`;
  }).join("");
}

function applyFilters() {
  let list = allContests.filter(c => urgency(c.deadline) !== "expired");

  if (searchText) {
    const q = searchText.toLowerCase();
    list = list.filter(c =>
      (c.name   || "").toLowerCase().includes(q) ||
      (c.theme  || "").toLowerCase().includes(q) ||
      (c.region || "").toLowerCase().includes(q)
    );
  }

  if      (activeFilter === "urgent")   list = list.filter(c => ["urgent","soon"].includes(urgency(c.deadline)));
  else if (activeFilter === "national") list = list.filter(c => !c.region || c.region === "全国");
  else if (activeFilter === "local")    list = list.filter(c => c.region && c.region !== "全国");
  else if (activeFilter === "prize")    list = list.filter(c => c.prize);

  render(list);
}

async function loadData() {
  try {
    const res  = await fetch(DATA_URL + "?t=" + Date.now());
    const data = await res.json();
    allContests = data.contests || [];

    if (data.updatedAt) {
      const d = new Date(data.updatedAt);
      document.getElementById("updated-at").textContent =
        d.toLocaleString("ja-JP", {
          timeZone: "Asia/Tokyo",
          year: "numeric", month: "2-digit", day: "2-digit",
          hour: "2-digit", minute: "2-digit"
        }) + " JST";
    }

    const active = allContests.filter(c => urgency(c.deadline) !== "expired");
    document.getElementById("stat-total").textContent    = active.length;
    document.getElementById("stat-urgent").textContent   = active.filter(c => urgency(c.deadline) === "urgent").length;
    document.getElementById("stat-soon").textContent     = active.filter(c => urgency(c.deadline) === "soon").length;
    document.getElementById("stat-national").textContent = active.filter(c => !c.region || c.region === "全国").length;

    // Sources bar
    const counts = {};
    active.forEach(c => {
      (c.sources || []).forEach(s => {
        counts[s.name] = (counts[s.name] || 0) + 1;
      });
    });
    document.getElementById("sources-bar").innerHTML =
      Object.entries(counts).map(([k, v]) => {
        const url = SOURCES[k] || "#";
        return `<a class="source-link" href="${url}" target="_blank" rel="noreferrer">${k}（${v}件）</a>`;
      }).join(" · ");

    applyFilters();
  } catch (e) {
    document.getElementById("empty-state").style.display = "block";
    console.error(e);
  }
}

document.getElementById("search").addEventListener("input", e => {
  searchText = e.target.value;
  applyFilters();
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    applyFilters();
  });
});

loadData();
</script>
</body>
</html>
